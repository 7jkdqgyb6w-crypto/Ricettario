<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ricettario Piccotti — CMS2-R4</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/static/cms.css">
</head>
<body>
  <header class="cms-topbar">
    <div class="cms-brand">Ricettario Piccotti — CMS2-R4</div>
    <div class="cms-actions">
      <button id="newRecipeBtn">Nuova ricetta</button>
      <button id="saveBtn" disabled>Salva</button>
      <span id="statusText">Pronto</span>
    </div>
  </header>

  <div class="cms-layout">
    <aside class="cms-sidebar-left">
      <div class="cms-panel-title">Ricette</div>
      <div id="recipeList" class="cms-recipe-list"></div>
    </aside>

    <main class="cms-center-wrap">
      <div class="cms-center-scroll" id="centerScroll">
        <div id="recipeCanvas" class="cms-recipe-canvas"></div>
      </div>
    </main>

    <aside class="cms-sidebar-right">
      <section class="cms-side-section">
        <div class="cms-panel-title">Immagini</div>
        <label class="cms-upload-row">
          <span>Importa</span>
          <input type="file" id="uploadInput" accept="image/*" multiple>
        </label>
        <div id="imageArchive" class="cms-image-archive"></div>
      </section>

      <section class="cms-side-section">
        <div class="cms-panel-title">Figura selezionata nel testo</div>
        <div id="figureEmptyState" class="cms-empty-state">Seleziona un'immagine nella ricetta.</div>
        <div id="figureProps" class="cms-figure-props is-disabled">
          <label class="cms-field">
            <span>ALT</span>
            <input type="text" id="figAlt" />
          </label>
          <label class="cms-field">
            <span>Didascalia</span>
            <textarea id="figCaption" rows="3"></textarea>
          </label>
          <label class="cms-field cms-field-inline">
            <span>Larghezza</span>
            <input type="number" id="figWidth" min="120" max="1200" step="10" />
            <span class="cms-suffix">%</span>
          </label>
          <label class="cms-field">
            <span>Comportamento testo</span>
            <select id="figAnchor">
              <option value="float">Contornata</option>
              <option value="block">Blocco</option>
            </select>
          </label>
          <label class="cms-field">
            <span>Ruolo</span>
            <select id="figRole">
              <option value="body">Corpo</option>
              <option value="cover">Presentazione</option>
            </select>
          </label>
          <div class="cms-button-row">
            <button type="button" id="figMoveUp">Sposta su</button>
            <button type="button" id="figMoveDown">Sposta giù</button>
          </div>
          <div class="cms-button-row">
            <button type="button" id="figApply">Applica</button>
            <button type="button" id="figRemove">Elimina dal testo</button>
          </div>
        </div>
      </section>
    </aside>
  </div>

  <div id="figureOverlay" class="cms-figure-overlay" hidden>
    <button type="button" class="cms-mini-button" id="overlayToggleAnchor">Contornata</button>
    <button type="button" class="cms-mini-button" id="overlayMoveUp">↑</button>
    <button type="button" class="cms-mini-button" id="overlayMoveDown">↓</button>
    <div class="cms-resize-handle cms-resize-handle-ne" data-handle="ne"></div>
    <div class="cms-resize-handle cms-resize-handle-se" data-handle="se"></div>
    <div class="cms-resize-handle cms-resize-handle-sw" data-handle="sw"></div>
    <div class="cms-resize-handle cms-resize-handle-nw" data-handle="nw"></div>
  </div>

  <script>
    window.CMS2_SITE_ROOT = {{ site_root|tojson }};
  </script>
  <script src="/static/cms.js"></script>
</body>
</html>
