<html data-cookie-banner="0" data-ga-measurement-id="" lang="it">
<head>
<meta charset="utf-8"/><meta content="width=device-width, initial-scale=1" name="viewport"/>

<meta content="Contatti del sito Ricette (e altro) di Pierre." name="description"/>
</head><body><div class="page"><header class="site-header"><a class="brand" href="index.html">Ricette (e altro) di Pierre</a><nav><a aria-label="Torna indietro" href="#" id="back-link">←</a><a href="indici/ricette.html">Ricette</a><a href="indici/ingredienti.html">Ingredienti</a><a href="indici/fonti.html">Fonti</a><a href="indici/geografia.html">Geografia</a></nav></header><main><div class="home-content"><h1>Scrivimi</h1><section class="lead home-intro"><p>Per comunicazioni sul sito o sui contenuti puoi scrivermi direttamente via email.</p></section><section class="block"><h2>Contatto</h2><p><a href="mailto:pierre.piccotti@gmail.com">pierre.piccotti@gmail.com</a></p></section><footer class="site-footer"><nav aria-label="Strumenti pagina" class="site-footer-center"><a class="site-footer-text" href="informativa.html">Info</a><a aria-label="Stampa pagina" class="site-footer-icon js-print-link" href="#"><img alt="" src="foto/ui/print-light.svg"/></a><a aria-label="Copia link pagina" class="site-footer-icon js-copy-link" href="#"><img alt="" src="foto/ui/link-light.svg"/></a></nav><div class="site-footer-right"><a aria-label="Apri QR della pagina" class="site-footer-qr-link js-qr-lightbox" href="foto/qr-statiche/scrivimi.png"><img alt="QR della pagina" src="foto/qr-statiche/scrivimi.png"/></a></div></footer></div></main></div><script>
(function(){
  var back = document.getElementById('back-link');
  if(!back) return;

  back.addEventListener('click', function(e){
    e.preventDefault();

    if(document.referrer && document.referrer.includes(location.origin)){
      history.back();
    } else {
      window.location.href = 'index.html';
    }
  });
})();
</script>
<script id="site-footer-script">
(function(){
  function ensureLightbox(){
    var lb=document.querySelector('.site-lightbox');
    if(lb) return lb;
    lb=document.createElement('div');
    lb.className='site-lightbox';
    lb.innerHTML='<button class="site-lightbox-close" aria-label="Chiudi">×</button><img class="site-lightbox-image" alt="">';
    lb.addEventListener('click', function(ev){ lb.classList.remove('is-open'); });
    document.addEventListener('keydown', function(ev){ if(ev.key==='Escape') lb.classList.remove('is-open'); });
    document.body.appendChild(lb);
    return lb;
  }
  function openLightbox(src, alt){
    var lb=ensureLightbox();
    var img=lb.querySelector('.site-lightbox-image');
    img.src=src; img.alt=alt||'';
    lb.classList.add('is-open');
  }
  function showCopyToast(){
    var oldToast=document.querySelector('.site-copy-toast');
    if(oldToast) oldToast.remove();
    var toast=document.createElement('div');
    toast.className='site-copy-toast';
    toast.textContent='URL copiato';
    toast.style.position='fixed';
    toast.style.left='50%';
    toast.style.bottom='22px';
    toast.style.transform='translateX(-50%)';
    toast.style.background='rgba(30,30,30,.92)';
    toast.style.color='#fff';
    toast.style.fontSize='13px';
    toast.style.fontWeight='700';
    toast.style.lineHeight='1';
    toast.style.padding='8px 10px';
    toast.style.borderRadius='7px';
    toast.style.zIndex='10001';
    toast.style.boxShadow='0 4px 16px rgba(0,0,0,.25)';
    toast.style.whiteSpace='nowrap';
    document.body.appendChild(toast);
    setTimeout(function(){ if(toast && toast.parentNode) toast.parentNode.removeChild(toast); }, 1200);
  }
  document.addEventListener('DOMContentLoaded', function(){
    document.querySelectorAll('.js-print-link').forEach(function(a){
      a.addEventListener('click', function(ev){ ev.preventDefault(); window.print(); });
    });
    document.querySelectorAll('.js-qr-lightbox').forEach(function(a){
      a.addEventListener('click', function(ev){
        ev.preventDefault();
        openLightbox(a.getAttribute('href'), (a.querySelector('img')||{}).alt || 'QR della pagina');
      });
    });
    document.querySelectorAll('.js-copy-link').forEach(function(a){
      a.addEventListener('click', async function(ev){
        ev.preventDefault();
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(window.location.href);
          } else {
            var ta=document.createElement('textarea');
            ta.value=window.location.href; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
          }
          showCopyToast();
        } catch(e) {}
      });
    });
  });
})();
</script></body></html>
