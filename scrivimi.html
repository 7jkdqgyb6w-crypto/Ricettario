<!DOCTYPE html>

<html data-cookie-banner="0" data-ga-measurement-id="" lang="it">
<head>
<meta charset="utf-8"/><meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Scrivimi – Ricette (e altro) di Pierre</title>
<link href="style.css" rel="stylesheet"/>
<meta content="Contatti del sito Ricette (e altro) di Pierre." name="description"/>
<style id="recipe-lightbox-style">.recipe-lightbox-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;padding:2rem;z-index:9999;cursor:zoom-out;}
.recipe-lightbox-overlay.is-hidden{display:none !important;}
.recipe-lightbox-frame{max-width:96vw;max-height:96vh;display:flex;flex-direction:column;gap:.75rem;align-items:center;}
.recipe-lightbox-frame img{display:block;max-width:96vw;max-height:88vh;width:auto;height:auto;box-shadow:0 8px 32px rgba(0,0,0,.45);background:#fff;}
.recipe-lightbox-caption{color:#fff;text-align:center;max-width:min(96vw,70rem);font-size:.95rem;line-height:1.35;}
.site-footer-right img{cursor:zoom-in;}
</style></head><body><div class="page"><header class="site-header"><a class="brand" href="index.html">Ricette (e altro) di Pierre</a><nav></nav></header><main><div class="home-content"><h1>Scrivimi</h1><section class="lead home-intro"><p>Per comunicazioni sul sito o sui contenuti puoi scrivermi direttamente via email.</p></section><section class="block"><h2>Contatto</h2><p><a href="mailto:pierre.piccotti@gmail.com">pierre.piccotti@gmail.com</a></p></section></div></main><footer class="site-footer"><div class="site-footer-left"><a class="site-footer-cc" href="https://creativecommons.org/licenses/by-nc-sa/4.0/" rel="noopener" target="_blank"><img alt="Licenza Creative Commons" src="foto/licenze/Cc-by-nc-sa_icon.svg"/></a></div><nav aria-label="Strumenti pagina" class="site-footer-center"><a class="site-footer-text" href="informativa.html">Info</a><a aria-label="Stampa pagina" class="site-footer-icon js-print-link" href="#"><img alt="" src="foto/ui/print-light.svg"/></a><a aria-label="Copia link pagina" class="site-footer-icon js-copy-link" href="#"><img alt="" src="foto/ui/link-light.svg"/></a></nav><div class="site-footer-right"><a aria-label="Apri QR della pagina" class="site-footer-qr-link" href="foto/qr-statiche/scrivimi.png"><img alt="QR della pagina" src="foto/qr-statiche/scrivimi.png"/></a></div></footer></div><script id="recipe-lightbox-script">(function(){
  function ensureLightbox(){
    let overlay = document.getElementById('recipeLightbox');
    if(overlay) return overlay;
    overlay = document.createElement('div');
    overlay.id = 'recipeLightbox';
    overlay.className = 'recipe-lightbox-overlay is-hidden';
    overlay.innerHTML = '<div class="recipe-lightbox-frame"><img alt=""><div class="recipe-lightbox-caption"></div></div>';
    document.body.appendChild(overlay);
    overlay.addEventListener('click', function(){ overlay.classList.add('is-hidden'); });
    document.addEventListener('keydown', function(ev){ if(ev.key === 'Escape') overlay.classList.add('is-hidden'); });
    return overlay;
  }
  function showCopyToast(){
    var oldToast=document.querySelector('.recipe-copy-toast');
    if(oldToast) oldToast.remove();
    var toast=document.createElement('div');
    toast.className='recipe-copy-toast';
    toast.textContent='URL copiato';
    document.body.appendChild(toast);
    setTimeout(function(){ if(toast && toast.parentNode) toast.parentNode.removeChild(toast); }, 1200);
  }
  document.addEventListener('DOMContentLoaded', function(){
    const overlay = ensureLightbox();
    const outImg = overlay.querySelector('img');
    const caption = overlay.querySelector('.recipe-lightbox-caption');
    document.querySelectorAll('.site-footer-right img').forEach(function(img){
      img.addEventListener('click', function(ev){
        ev.preventDefault();
        ev.stopPropagation();
        outImg.src = img.currentSrc || img.src;
        outImg.alt = img.alt || '';
        caption.textContent = img.alt || '';
        overlay.classList.remove('is-hidden');
      });
    });
    document.querySelectorAll('.js-print-link').forEach(function(a){
      a.addEventListener('click', function(ev){ ev.preventDefault(); window.print(); });
    });
    document.querySelectorAll('.js-copy-link').forEach(function(a){
      a.addEventListener('click', async function(ev){
        ev.preventDefault();
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(window.location.href);
          } else {
            var ta=document.createElement('textarea');
            ta.value=window.location.href; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
          }
          showCopyToast();
        } catch(e) {}
      });
    });
  });
})();</script></body></html>
